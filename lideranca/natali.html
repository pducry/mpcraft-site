  <script src="../assets/theme.js"></script>
  <script>
    // Member-specific gate
    (function () {
      const GATE = {
        KEY:  'lideranca-natali-v1',
        HASH: 'da8aa575e573c5cb5ce099382ebf546dc9dbacff688802cbb53309df1f206ecd',
      };
      const html = document.documentElement;
      if (html.classList.contains('authed')) return;
      const form  = document.getElementById('gate-form');
      const input = document.getElementById('gate-input');
      const err   = document.getElementById('gate-error');
      if (!form || !input) return;

      async function sha256(text) {
        const buf  = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
      }

      setTimeout(() => input.focus(), 50);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const value = input.value.trim();
        if (!value) return;
        const hash = await sha256(value);
        if (hash === GATE.HASH) {
          try { localStorage.setItem(GATE.KEY, '1'); } catch (_) {}
          html.classList.add('authed');
        } else {
          if (err) err.classList.add('show');
          form.classList.add('shake');
          setTimeout(() => form.classList.remove('shake'), 350);
          input.select();
        }
      });
    })();
  </script>
